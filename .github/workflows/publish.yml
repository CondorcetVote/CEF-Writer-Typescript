name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Type check
        run: bun run type-check

      - name: Run tests
        run: bun test

      - name: Build
        run: bun run build

      # OIDC Trusted Publishing needs a recent npm CLI (>= 11.5.1); the runner
      # ships an older one. No token is used: authentication happens via the
      # short-lived OIDC id-token, and provenance is attached automatically.
      - name: Update npm for trusted publishing
        run: npm install -g npm@latest

      - name: Publish to npm
        run: npm publish
